* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

.hdr p { font-size:12px; color:var(--muted); margin-top:4px; }
.tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; overflow-x:auto; }
.tab { flex:1; padding:12px 6px; border:none; background:none; cursor:pointer; font-size:11px; font-weight:500; color:var(--muted); border-bottom:2px solid transparent; white-space:nowrap; font-family:inherit; }
.tab.on { font-weight:700; color:var(--accent); border-bottom-color:var(--accent); }
.ct { padding:16px; }
.hint { font-size:11px; color:var(--muted); margin-bottom:12px; }
.search { width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:14px; margin-bottom:12px; outline:none; font-family:inherit; }
.search:focus { border-color:var(--accent); }
.card { background:var(--surface); border-radius:10px; padding:12px 14px; margin-bottom:6px; border:1px solid var(--border); }
.card.tap { cursor:pointer; }
.row-top { display:flex; justify-content:space-between; align-items:center; }
.title { font-size:14px; font-weight:600; }
.meta { display:flex; align-items:center; gap:6px; margin-top:4px; }
.badge { color:#fff; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; display:inline-block; }
.rate { font-size:13px; font-weight:700; color:var(--accent); }
.chev { font-size:16px; color:var(--muted); transition:transform 0.2s; }

.detail { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
.detail-notes { font-size:12px; color:var(--muted); line-height:1.5; margin-bottom:8px; }
.alts-lbl { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.alts { display:flex; flex-wrap:wrap; gap:5px; }
.alt { background:#2a2e38; padding:3px 8px; border-radius:4px; font-size:11px; color:var(--muted); }
.card-hdr { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; margin-bottom:6px; color:#fff; }
.card-hdr-name { font-size:14px; font-weight:700; }
.card-hdr-info { font-size:11px; opacity:0.6; margin-left:auto; }
.cr-name { font-size:13px; font-weight:600; }
.cr-info { font-size:11px; color:var(--muted); margin-top:1px; }
.mgrid { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; }
.mbtn { width:38px; height:30px; border-radius:5px; font-size:10px; font-weight:600; cursor:pointer; font-family:inherit; border:1px solid var(--border); background:var(--surface); color:var(--muted); }
.mbtn.used { border-color:var(--green); background:var(--green-bg); color:var(--green); }
.mbtn.cur { border-color:var(--accent); background:var(--cur-bg); color:var(--accent); }
.mbtn.miss { background:var(--red-bg); border-color:rgba(248,113,113,0.3); color:var(--red); }
.hgrid { display:flex; gap:6px; margin-top:8px; }

.hbtn.used { border-color:var(--green); background:var(--green-bg); color:var(--green); }

.abtn.used { border-color:var(--green); background:var(--green-bg); color:var(--green); }
.cr-notes { font-size:11px; color:#555; margin-top:6px; line-height:1.4; }
.ben-hdr { padding:8px 12px; border-radius:8px 8px 0 0; color:#fff; font-size:14px; font-weight:700; }
.ben-hdr span { font-size:11px; opacity:0.6; margin-left:8px; }
.ben-list { background:var(--surface); border-radius:0 0 8px 8px; padding:10px 12px; border:1px solid var(--border); border-top:none; margin-bottom:12px; }
.ben-item { font-size:12px; line-height:1.7; color:var(--muted); padding:2px 0; border-bottom:1px solid var(--border); }
.ben-item:last-child { border-bottom:none; }
.pur-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.pur-sc { font-size:14px; font-weight:600; }
.pur-why { font-size:12px; color:var(--muted); line-height:1.5; }
.v-hero { background:linear-gradient(135deg,var(--surface),#1e222c); border-radius:14px; padding:20px; margin-bottom:16px; border:1px solid var(--border); }
.v-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.v-big { font-size:36px; font-weight:800; letter-spacing:-1px; }
.v-cols { display:flex; gap:16px; margin-top:12px; }
.v-col-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; }
.v-col-val { font-size:18px; font-weight:700; }
.v-card { background:var(--surface); border-radius:12px; padding:14px 16px; margin-bottom:10px; border:1px solid var(--border); }
.v-card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.v-card-name { font-size:14px; font-weight:600; }
.v-card-sub { font-size:11px; color:var(--muted); }
.v-card-net { font-size:16px; font-weight:700; text-align:right; }
.v-card-net-lbl { font-size:10px; color:var(--muted); text-align:right; }
.pbar { background:#2a2e38; border-radius:6px; height:6px; overflow:hidden; margin-bottom:6px; }
.pbar-fill { height:100%; border-radius:6px; transition:width 0.3s; }
.pbar-info { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); }
.nf-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; margin-top:8px; }

.reset { display:block; margin:16px auto 0; padding:8px 20px; border-radius:8px; border:1px solid var(--red); background:none; color:var(--red); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
.footer { padding:12px 16px 32px; text-align:center; font-size:10px; color:#444; }

</head>

  CR.filter(c=>c.card===ck).forEach(cr=>{
    if(cr.per==="monthly"){
      MO.forEach((_,mi)=>{if(U[cr.id+"_"+mi])t+=(cr.mv||cr.amt/12)});
    }else if(cr.per==="semi"){
      if(U[cr.id])t+=cr.amt;
    }else{
      if(U[cr.id])t+=cr.amt;
    }
  });
  return t;
}
function maxV(ck){return CR.filter(c=>c.card===ck).reduce((s,c)=>s+c.amt,0)}

// Render
function renderTabs(){
  const ts=[{id:"value",l:"Value"},{id:"optimizer",l:"Spend"},{id:"credits",l:"Credits"},{id:"benefits",l:"Benefits"},{id:"purchases",l:"Purchases"}];
  document.getElementById("tabs").innerHTML=ts.map(t=>`<button class="tab${tab===t.id?' on':''}" onclick="sw('${t.id}')">${t.l}</button>`).join("");
}
function sw(id){tab=id;exp=null;renderTabs();render()}

document.getElementById("hdr-sub").textContent="8 cards · "+new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"});

function render(){
  const el=document.getElementById("ct");
  if(tab==="value")el.innerHTML=rValue();
  else if(tab==="optimizer")el.innerHTML=rSpend();
  else if(tab==="credits")el.innerHTML=rCredits();
  else if(tab==="benefits")el.innerHTML=rBen();
  else el.innerHTML=rPur();
}

function rValue(){
  const feeCards=Object.entries(C).filter(([,c])=>c.fee>0);
  const tc=Object.keys(C).reduce((s,k)=>s+val(k),0);
  const tf=feeCards.reduce((s,[,c])=>s+c.fee,0);
  const nv=tc-tf;
  let h=`<div class="v-hero">
    <div class="v-label">Net Value (Credits − Fees)</div>
    <div class="v-big" style="color:${nv>=0?'var(--green)':'var(--red)'}">${nv>=0?'+':''}$${nv.toLocaleString()}</div>
    <div class="v-cols">
      <div><div class="v-col-lbl">Collected</div><div class="v-col-val" style="color:var(--green)">$${tc.toLocaleString()}</div></div>
      <div><div class="v-col-lbl">Fees</div><div class="v-col-val" style="color:var(--red)">$${tf.toLocaleString()}</div></div>
    </div>
  </div>`;

  feeCards.forEach(([ck,card])=>{
    const col=val(ck), mx=maxV(ck), nt=col-card.fee, pct=mx>0?Math.round(col/mx*100):0;
    h+=`<div class="v-card">
      <div class="v-card-top">
        <div><div class="v-card-name">${card.name}</div><div class="v-card-sub">Renews ${MO[card.rmo]} · ${renewLabel(ck)}</div></div>
        <div><div class="v-card-net" style="color:${nt>=0?'var(--green)':'var(--red)'}">${nt>=0?'+':''}$${nt}</div><div class="v-card-net-lbl">net</div></div>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:linear-gradient(90deg,${card.accent},var(--accent))"></div></div>
      <div class="pbar-info"><span>$${col} of $${mx} (${pct}%)</span><span>$${card.fee} fee</span></div>
    </div>`;
  });

  const nfCards=Object.entries(C).filter(([ck,c])=>c.fee===0&&maxV(ck)>0);
  if(nfCards.length){
    h+=`<div class="nf-lbl">No-Fee Cards</div>`;
    nfCards.forEach(([ck,card])=>{
      h+=`<div class="nf-row"><span>${card.short}</span><span style="font-weight:600;color:var(--green)">$${val(ck)} / $${maxV(ck)}</span></div>`;
    });
  }
  return h;
}

function rSpend(){
  const sv=document.querySelector(".search")?.value||"";
  const f=SPEND.filter(s=>s.cat.toLowerCase().includes(sv.toLowerCase()));
  let h=`<input class="search" type="text" placeholder="Search category..." oninput="render()" value="${sv}">
    <div class="hint">Tap to expand. Rates reflect June 2026.</div>`;
  f.forEach((s,i)=>{
    const o=exp===i;
    h+=`<div class="card tap" onclick="tRow(${i})">
      <div class="row-top"><div>
        <div class="title">${s.cat}</div>
        <div class="meta"><span class="badge" style="background:${C[s.best].color}">${C[s.best].short}</span><span class="rate">${s.rate}</span></div>
      </div><span class="chev${o?' open':''}">▾</span></div>
      ${o?`<div class="detail"><div class="detail-notes">${s.notes}</div>${s.alts.length?`<div class="alts-lbl">Alternatives</div><div class="alts">${s.alts.map(a=>`<span class="alt">${a}</span>`).join("")}</div>`:""}</div>`:""}
    </div>`;
  });
  return h;
}
function tRow(i){exp=exp===i?null:i;render()}

function rCredits(){
  const cardKeys=[...new Set(CR.map(c=>c.card))];
  let h=`<div class="hint">Tap months to mark used. Data saves to your device.</div>`;
  cardKeys.forEach(ck=>{
    const card=C[ck];
    h+=`<div class="card-hdr" style="background:${card.color}">
      <span class="card-hdr-name">${card.name}</span>
      <span class="card-hdr-info">${card.fee>0?'renews '+MO[card.rmo]+' · $'+card.fee:'no fee'}</span>
    </div>`;
    CR.filter(c=>c.card===ck).forEach(cr=>{
      h+=`<div class="card" style="margin-bottom:4px"><div class="cr-name">${cr.name}</div><div class="cr-info">$${cr.amt}/yr · ${cr.reset}</div>`;
      if(cr.per==="monthly"){
        h+=`<div class="mgrid">${MO.map((m,mi)=>{
          const k=cr.id+"_"+mi, u=U[k], p=mi<CM, cu=mi===CM;
          let cls="mbtn";
          if(u)cls+=" used"; else if(cu)cls+=" cur"; else if(p)cls+=" miss";
          return`<button class="${cls}" onclick="event.stopPropagation();tog('${k}')">${m}</button>`;
        }).join("")}</div>`;
      }else if(cr.per==="semi"){
        const u=U[cr.id];
        h+=`<button class="${u?'abtn used':'abtn'}" onclick="event.stopPropagation();tog('${cr.id}')">${u?'✓ Used':'Mark as Used'}</button>`;
      }else{
        const u=U[cr.id];
        h+=`<button class="${u?'abtn used':'abtn'}" onclick="event.stopPropagation();tog('${cr.id}')">${u?'✓ Used':'Mark as Used'}</button>`;
      }
      h+=`<div class="cr-notes">${cr.notes}</div></div>`;
    });
  });
  h+=`<button class="reset" onclick="if(confirm('Clear all tracking data?')){U={};save();render()}">Reset All Tracking Data</button>`;
  return h;
}

function rBen(){
  return BEN.map(b=>`<div>
    <div class="ben-hdr" style="background:${C[b.card].color}">${C[b.card].name}<span>$${C[b.card].fee}/yr</span></div>
    <div class="ben-list">${b.items.map(i=>`<div class="ben-item">${i}</div>`).join("")}</div>
  </div>`).join("");
}

function rPur(){
  return`<div class="hint">Best card by earning rate + protections.</div>`+PUR.map(p=>`<div class="card">
    <div class="pur-top"><span class="badge" style="background:${C[p.best].color}">${C[p.best].short}</span><span class="pur-sc">${p.sc}</span></div>
    <div class="pur-why">${p.why}</div>
  </div>`).join("");
}

renderTabs();render();
</script>
</body>
</html>
