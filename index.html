const PUR=[
  {sc:"Flights (direct)",best:"CSR",why:"3x UR + trip cancellation + delay + luggage. ~6% effective with full protection."},
  {sc:"Flights (portal)",best:"VX",why:"5x miles Capital One Travel. CSR/CSP 5x Chase Travel."},
  {sc:"Car Rental",best:"CSR",why:"Primary CDW up to $75k. Decline counter insurance. CSP also primary for personal."},
  {sc:"Electronics",best:"CSR",why:"120-day purchase protection ($500/claim) + extended warranty. CSP identical."},
  {sc:"Appliances",best:"CSR",why:"Purchase protection + extended warranty. Extra year on warranties ≤3 years."},
  {sc:"Furniture / Home",best:"GOLD",why:"$1k/incident purchase protection (vs Chase $500). VX 2x for earning."},
  {sc:"International Purchases",best:"CSR",why:"No FTX + 3x travel/dining. Bring Gold for 4x dining."},
  {sc:"Hotel (luxury 2+ nights)",best:"CSR",why:"Stack Edit credits ($500) + 2026 select hotel ($250). Save $750+."},
  {sc:"Hotel (IHG/Omni/Virgin)",best:"CSR",why:"2026-only $250 credit via Chase Travel. 2+ nights prepaid."},

  {sc:"Concert / Events",best:"CSR",why:"$300/yr StubHub credit ($150/half). 3x on entertainment."},

  {sc:"Gas (large fill-ups)",best:"CSP",why:"3x UR (June 2026). Discover 5% Q3. BCE 3% year-round ≤$6k."},
  {sc:"Cell Phone Bill",best:"VX",why:"Unlocks phone protection: $800 coverage, $25 deductible. Plus 2x miles."},
];

// State
let tab="value",exp=null,bexp={},U={};
function load(){try{U=JSON.parse(localStorage.getItem("wov3")||"{}")}catch(e){U={}}}
function save(){try{localStorage.setItem("wov3",JSON.stringify(U))}catch(e){}}
function tog(k){U[k]=!U[k];if(!U[k])delete U[k];save();render()}
function cycleAmt(k,steps){
  const cur=U[k]||0;
  const idx=steps.indexOf(cur);
  const next=steps[(idx+1)%steps.length];
  if(next===0)delete U[k];else U[k]=next;
  save();render();
}
load();

// Value calculation
function val(ck){
  let t=0;
  CR.filter(c=>c.card===ck).forEach(cr=>{
    if(cr.per==="m"){
      MO.forEach((_,mi)=>{if(U[cr.id+"_"+mi])t+=cr.mv});
    }else if(cr.per==="mv"){
      MO.forEach((_,mi)=>{t+=(U[cr.id+"_"+mi]||0)});
    }else if(cr.per==="pair"){
      cr.subs.forEach(s=>{if(U[s.id])t+=s.v});
    }else{
      if(U[cr.id])t+=cr.amt;
    }
  });
  return t;
}
function maxV(ck){return CR.filter(c=>c.card===ck).reduce((s,c)=>s+c.amt,0)}

// Render
function rT(){
  const ts=[{id:"value",l:"Value"},{id:"optimizer",l:"Spend"},{id:"credits",l:"Credits"},{id:"benefits",l:"Benefits"},{id:"purchases",l:"Purchases"}];
  document.getElementById("tabs").innerHTML=ts.map(t=>`<button class="tab${tab===t.id?' on':''}" onclick="sw('${t.id}')">${t.l}</button>`).join("");
}
function sw(id){tab=id;exp=null;bexp={};rT();render()}
document.getElementById("hsub").textContent="8 cards · "+new Date().toLocaleDateString("en-US",{month:"long",year:"numeric"});

function render(){
  const el=document.getElementById("ct");
  if(tab==="value")el.innerHTML=rVal();
  else if(tab==="optimizer")el.innerHTML=rSp();
  else if(tab==="credits")el.innerHTML=rCr();
  else if(tab==="benefits")el.innerHTML=rBn();
  else el.innerHTML=rPu();
}

function rVal(){
  const fc=Object.entries(C).filter(([,c])=>c.fee>0);
  const tc=Object.keys(C).reduce((s,k)=>s+val(k),0);
  const tf=fc.reduce((s,[,c])=>s+c.fee,0);
  const nv=tc-tf;
  let h=`<div class="vhero"><div class="vlbl">Net Value (Credits − Fees)</div>
    <div class="vbig" style="color:${nv>=0?'var(--gn)':'var(--rd)'}">${nv>=0?'+':''}$${nv.toLocaleString()}</div>
    <div class="vcols"><div><div class="vcl">Collected</div><div class="vcv" style="color:var(--gn)">$${tc.toLocaleString()}</div></div>
    <div><div class="vcl">Fees</div><div class="vcv" style="color:var(--rd)">$${tf.toLocaleString()}</div></div></div></div>`;
  fc.forEach(([ck,card])=>{
    const co=val(ck),mx=maxV(ck),nt=co-card.fee,pct=mx>0?Math.round(co/mx*100):0;
    h+=`<div class="vcd"><div class="vct"><div><div class="vcn">${card.n}</div><div class="vcs">Renews ${MO[card.rm]} · ${rl(ck)}</div></div>
    <div><div class="vcnet" style="color:${nt>=0?'var(--gn)':'var(--rd)'}">${nt>=0?'+':''}$${nt}</div><div class="vcnl">net</div></div></div>
    <div class="pb"><div class="pbf" style="width:${pct}%;background:linear-gradient(90deg,${card.ac},var(--ac))"></div></div>
    <div class="pbi"><span>$${co} of $${mx} (${pct}%)</span><span>$${card.fee} fee</span></div></div>`;
  });
  const nfc=Object.entries(C).filter(([ck,c])=>c.fee===0&&maxV(ck)>0);
  if(nfc.length){h+=`<div class="nfl">No-Fee Cards</div>`;nfc.forEach(([ck,card])=>{h+=`<div class="nfr"><span>${card.s}</span><span style="font-weight:600;color:var(--gn)">$${val(ck)} / $${maxV(ck)}</span></div>`})}
  h+=`<div class="xbtn"><button class="xb" onclick="doExport()">Export Data</button><button class="xb" onclick="doImport()">Import Data</button><button class="xb danger" onclick="doReset()">Reset All</button></div>`;
  return h;
}

function rSp(){
  const sv=document.querySelector(".search")?.value||"";
  const f=SP.filter(s=>s.cat.toLowerCase().includes(sv.toLowerCase()));
  let h=`<input class="search" type="text" placeholder="Search category..." oninput="render()" value="${sv}"><div class="hint">Tap to expand. June 2026 rates.</div>`;
  f.forEach((s,i)=>{const o=exp===i;
    h+=`<div class="cd tap" onclick="tRow(${i})"><div class="row-top"><div><div class="ttl">${s.cat}</div><div class="meta"><span class="badge" style="background:${C[s.best].co}">${C[s.best].s}</span><span class="rate">${s.rate}</span></div></div><span class="chev${o?' open':''}">▾</span></div>
    ${o?`<div class="detail"><div class="dnotes">${s.notes}</div>${s.alts.length?`<div class="albl">Alternatives</div><div class="alts">${s.alts.map(a=>`<span class="alt">${a}</span>`).join("")}</div>`:""}</div>`:""}</div>`;
  });return h;
}
function tRow(i){exp=exp===i?null:i;render()}

function rCr(){
  const cks=[...new Set(CR.map(c=>c.card))];
  let h=`<div class="hint">Monthly: tap to toggle. DoorDash: tap to cycle $ amount. Months ordered by renewal cycle.</div>`;
  cks.forEach(ck=>{
    const card=C[ck],rm=card.rm;
    h+=`<div class="chdr" style="background:${card.co}"><span class="chdr-n">${card.n}</span><span class="chdr-i">${card.fee>0?'renews '+MO[card.rm]+' · $'+card.fee:'no fee'}</span></div>`;
    CR.filter(c=>c.card===ck).forEach(cr=>{
      h+=`<div class="cd" style="margin-bottom:4px"><div class="crn">${cr.name}</div><div class="cri">$${cr.amt}/yr · ${cr.reset}</div>`;

      if(cr.per==="m"){
        const cycle=cyc(rm);
        h+=`<div class="mgrid">${cycle.map(mi=>{
          const k=cr.id+"_"+mi,u=U[k],p=isPast(mi,rm),cu=mi===CM;
          let cls="mb";if(u)cls+=" used";else if(cu)cls+=" cur";else if(p)cls+=" miss";
          return`<button class="${cls}" onclick="event.stopPropagation();tog('${k}')">${MO[mi]}</button>`;
        }).join("")}</div>`;
      }else if(cr.per==="mv"){
        const cycle=cyc(rm);
        h+=`<div class="mgrid">${cycle.map(mi=>{
          const k=cr.id+"_"+mi,v=U[k]||0,p=isPast(mi,rm),cu=mi===CM;
          let cls="mb";if(v>=cr.steps[cr.steps.length-1])cls+=" used";else if(v>0)cls+=" partial";else if(cu)cls+=" cur";else if(p)cls+=" miss";
          return`<button class="${cls}" onclick="event.stopPropagation();cycleAmt('${k}',[${cr.steps.join(',')}])" style="min-width:40px">${v>0?'$'+v:MO[mi]}</button>`;
        }).join("")}</div>`;
      }else if(cr.per==="pair"){
        h+=`<div class="pair-row">${cr.subs.map(s=>{
          const u=U[s.id];
          return`<button class="${u?'ab used':'ab'}" onclick="event.stopPropagation();tog('${s.id}')">${u?'✓ ':'' }${s.label}</button>`;
        }).join("")}</div>`;
      }else{
        const u=U[cr.id];
        h+=`<div style="margin-top:8px"><button class="${u?'ab used':'ab'}" onclick="event.stopPropagation();tog('${cr.id}')">${u?'✓ Used':'Mark as Used'}</button></div>`;
      }
      h+=`<div class="crnt">${cr.notes}</div></div>`;
    });
  });
  return h;
}

function rBn(){
  let h="";
  BEN.forEach(b=>{
    h+=`<div><div class="bhdr" style="background:${C[b.card].co}">${C[b.card].n}<span>$${C[b.card].fee}/yr</span></div><div class="blst">`;
    b.items.forEach((item,i)=>{
      const bk=b.card+"_"+i,desc=item.k?BD.find(d=>d.n===item.k):null,isO=bexp[bk];
      h+=`<div class="bi" ${desc?`onclick="tBen('${bk}')"`:''}><div class="bi-top"><span class="bi-name">${item.t}</span>`;
      if(desc)h+=`<span class="bi-chev${isO?' open':''}">▾</span>`;
      h+=`</div>${desc&&isO?`<div class="bi-desc">${desc.d}</div>`:''}
      </div>`;
    });
    h+=`</div></div>`;
  });return h;
}
function tBen(k){bexp[k]=!bexp[k];render()}

function rPu(){
  let h=`<div class="hint">Best card by earning + protections.</div>`;
  PUR.forEach(p=>{h+=`<div class="cd"><div class="ptop"><span class="badge" style="background:${C[p.best].co}">${C[p.best].s}</span><span class="psc">${p.sc}</span></div><div class="pw">${p.why}</div></div>`});
  return h;
}

// Export/Import
function doExport(){
  const d=JSON.stringify(U);
  if(navigator.clipboard?.writeText){navigator.clipboard.writeText(d).then(()=>alert("Copied to clipboard! Save this somewhere safe.")).catch(()=>showEx(d))}else{showEx(d)}
}
function showEx(d){
  document.getElementById("modal").innerHTML=`<div class="modal-bg" onclick="closeM()"><div class="modal" onclick="event.stopPropagation()">
    <h3>Export Data</h3><p style="font-size:12px;color:var(--mt);margin-bottom:8px">Copy and save this text:</p>
    <textarea id="mdata" readonly>${d}</textarea>
    <div class="modal-btns"><button class="mbc" onclick="closeM()">Close</button><button class="mbo" onclick="document.getElementById('mdata').select();document.execCommand('copy');alert('Copied!')">Copy</button></div></div></div>`;
}
function doImport(){
  document.getElementById("modal").innerHTML=`<div class="modal-bg" onclick="closeM()"><div class="modal" onclick="event.stopPropagation()">
    <h3>Import Data</h3><p style="font-size:12px;color:var(--mt);margin-bottom:8px">Paste your exported data:</p>
    <textarea id="idata" placeholder="Paste JSON here..."></textarea>
    <div class="modal-btns"><button class="mbc" onclick="closeM()">Cancel</button><button class="mbo" onclick="runImp()">Import</button></div></div></div>`;
}
function runImp(){try{U=JSON.parse(document.getElementById("idata").value);save();closeM();render();alert("Imported!")}catch(e){alert("Invalid data.")}}
function closeM(){document.getElementById("modal").innerHTML=""}
function doReset(){if(confirm("Clear all tracking data?")){U={};save();render()}}

rT();render();
</script>
